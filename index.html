<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>controlled chaos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="img/C-LOGO_BLACK.png">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <main class="experience">

    <header class="topbar">
      <div>
        <p class="eyebrow">interactive web project</p>
        <h1>controlled chaos</h1>
      </div>

      <div class="controls">
        <button id="toggleDriftBtn" class="ui-btn">pause drift</button>
        <button id="resetBtn" class="ui-btn">reset layout</button>
      </div>
    </header>

    <section class="intro">
      <p>
        layout starts organized, then slowly breaks. hover and click to mess it up.
      </p>
    </section>

    <section class="grid-wrap">
      <div class="grid" id="grid"></div>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
