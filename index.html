<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>pokemon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="img/C-LOGO_BLACK.png">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <main class="experience">
    <header class="topbar">
      <div>
        <p class="eyebrow">pokemon scramble</p>
        <h1>I CHOOSE WHO?</h1>
      </div>
    </header>

    <section class="intro">
      <p>
        select 6 randomized cards and then drag the pokeball to the sidekick of your choice!
      </p>
    </section>

    <section class="status-row">
      <p id="pickCounter" class="pick-counter">6 cells left to pick</p>

      <div class="pokeball-area">
        <img
          id="pokeball"
          class="pokeball"
          src="img/pokeball.png"
          alt="pokeball"
          draggable="false"
        >
      </div>
    </section>

    <section class="grid-wrap">
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <div id="popupOverlay" class="popup-overlay hidden">
    <div class="popup-box">
      <button id="closePopupBtn" class="popup-close" type="button" aria-label="close popup">x</button>
      <p id="popupMessage" class="popup-message"></p>
    </div>
  </div>

  <div id="miniNotice" class="mini-notice hidden"></div>

  <script src="js/main.js"></script>
</body>
</html>
