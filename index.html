<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>controlled chaos</title>
  <meta name="description" content="An interactive website based on chaos and control.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="img/C-LOGO_BLACK.png">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">
</head>

<body>
 <main class="experience">
    <header class="topbar">
      <div class="title-group">
        <p class="eyebrow">interactive web project</p>
        <h1>controlled chaos</h1>
      </div>

      <div class="controls">
        <button id="toggleDriftBtn" class="ui-btn" type="button" aria-pressed="true">
          pause drift
        </button>
        <button id="resetBtn" class="ui-btn" type="button">
          reset layout
        </button>
      </div>
    </header>

    <section class="intro">
      <p>
        This project is about a layout that starts organized and then slowly slips
        out of place. Hover over blocks to disturb them. Click blocks to make
        them stay more unstable.
      </p>
    </section>

    <section class="legend">
      <p>hover = temporary shift</p>
      <p>click = lock in disorder</p>
      <p>reset = restore order</p>
    </section>

    <section class="grid-wrap">
      <div class="grid" id="grid"></div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
